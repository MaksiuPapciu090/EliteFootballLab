<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Elite Football Lab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0A0A0A;
      color: #FFFFFF;
      text-align: center;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: linear-gradient(180deg, #000000 0%, #0A0A0A 100%);
    }

    .hero h1 {
      font-size: 3rem;
      color: #00E0FF;
      text-shadow: 0 0 20px #00E0FF;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 1.3rem;
      opacity: 0.9;
      margin-bottom: 30px;
    }

    .logo {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: 3px solid #00E0FF;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.4rem;
      color: #00E0FF;
      text-shadow: 0 0 10px #00E0FF;
      margin-bottom: 30px;
    }

    .desc {
      max-width: 600px;
      margin: 0 auto;
      font-size: 1rem;
      color: #AAAAAA;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>ELITE FOOTBALL LAB</h1>
    <p>Train Smarter. Play Higher.</p>

    <div class="logo">
      LOGO
    </div>

    <p class="desc">
      Elite Football Lab to nowoczesna marka treningowa dla piłkarzy,
      łącząca technologię, analizę i profesjonalny rozwój zawodnika.
    </p>
  </div>

</body>
</html>
