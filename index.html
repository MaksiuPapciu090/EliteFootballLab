<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Elite Football Lab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0A0A0A;
      color: #FFFFFF;
      text-align: center;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: linear-gradient(180deg, #000000 0%, #0A0A0A 100%);
    }

    .hero h1 {
      font-size: 3.5rem;
      color: #00E0FF;
      text-shadow: 0 0 25px #00E0FF;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 1.4rem;
      opacity: 0.9;
      margin-bottom: 30px;
    }

    .logo-img {
      width: 220px;
      margin-bottom: 30px;
      filter: drop-shadow(0 0 15px #00E0FF);
    }

    .desc {
      max-width: 600px;
      margin: 0 auto;
      font-size: 1.1rem;
      color: #AAAAAA;
      line-height: 1.6;
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>ELITE FOOTBALL LAB</h1>
    <p>Train Smarter. Play Higher.</p>

    <!-- TU WKLEJASZ LOGO -->
    <img src="logo.png" class="logo-img" alt="Elite Football Lab Logo">

    <p class="desc">
      Elite Football Lab to nowoczesna marka treningowa dla piłkarzy,
      łącząca technologię, analizę i profesjonalny rozwój zawodnika.
    </p>
  </div>

</body>
</html>
